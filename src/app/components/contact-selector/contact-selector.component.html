<div>
    <!-- Barre de recherche -->
    <div class="mb-3">
        <div class="relative">
            <input type="text" [(ngModel)]="searchTerm" (input)="filterContacts()"
                class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:border-blue-500"
                placeholder="Rechercher par nom, prénom, entreprise...">
            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
        </div>
    </div>

    <!-- Liste des contacts -->
    <div class="border rounded-lg max-h-[400px] overflow-y-auto">
        <div class="sticky top-0 bg-gray-50 border-b px-4 py-2 flex items-center text-sm font-medium text-gray-700">
            <div class="w-1/2">Contact</div>
            <div class="w-1/2">Entreprise</div>
        </div>

        <div class="divide-y">
            <!-- Liste filtrée -->
            <div *ngFor="let contact of filteredContacts" (click)="selectContact(contact)"
                class="px-4 py-3 hover:bg-gray-50 cursor-pointer"
                [class.bg-blue-50]="selectedContact?.id === contact.id">

                <div class="flex">
                    <div class="w-1/2">
                        <div class="font-medium">{{contact.prenom}} {{contact.nom}}</div>
                        <div class="text-sm text-gray-500 flex flex-col gap-1">
                            <div class="flex items-center">
                                <i class="fas fa-phone mr-2"></i>
                                {{contact.phone}}
                            </div>
                            <div *ngIf="contact.email" class="flex items-center">
                                <i class="fas fa-envelope mr-2"></i>
                                {{contact.email}}
                            </div>
                        </div>
                    </div>
                    <div class="w-1/2">
                        <div class="text-gray-700">{{contact.entreprise?.denomination}}</div>
                        <div *ngIf="contact.entreprise?.siret" class="text-sm text-gray-500">
                            SIRET: {{contact.entreprise?.siret}}
                        </div>
                    </div>
                </div>
            </div>

            <!-- État vide -->
            <div *ngIf="filteredContacts.length === 0" class="p-8 text-center text-gray-500">
                Aucun contact ne correspond à votre recherche
            </div>
        </div>
    </div>
</div>
