<div class="container w-full mx-auto mb-10">
  <div class="left">
    <app-enquete-generator [(questions$M)]="questions$M"></app-enquete-generator>
  </div>
  <div class="right">
    <app-enquete-review [(questions$M)]="questions$M"></app-enquete-review>
  </div>
</div>

<div class="w-full mx-auto flex flex-column item-center justify-center">
  <div class="w-[400px]">
    <label for="titre">Enquête Title:</label>
    <input id="titre" type="text" [(ngModel)]="enqueteTitle" placeholder="Enter titre"
      class="w-full mx-auto border border-1">
  </div>

  <div class="w-[400px]">
    <label for="description">Enquête Description:</label>
    <textarea id="description" [(ngModel)]="enqueteDescription" placeholder="Enter description"
      class="w-full mx-auto border border-1"></textarea>
  </div>

  <button mat-fab class="save-element flex flex-row justify-center items-center mt-10" extended
    (click)="saveQuestions()" [disabled]="isSaveDisabled()">
    <mat-icon>save</mat-icon>
    <div class="hidden sm:flex ml-2">Save Enquête</div>
  </button>
</div>

{{questions$M()}}
