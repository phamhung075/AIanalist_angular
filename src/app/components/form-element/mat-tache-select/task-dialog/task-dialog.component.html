<form [formGroup]="taskForm" class="form-container w-full" (ngSubmit)="onSubmit()">
  <h2><b>Création task</b></h2>

  <label for="titre">➡️Titre</label>
  <input type="text" id="titre" name="titre" formControlName="titre" placeholder="titre">

  <label for="description">➡️ Description</label>
  <quill-editor formControlName="description" [modules]="{ toolbar: true }"></quill-editor>

  <label for="tempsLimite">⏳ Temps Limite</label>
  <input matInput type="date" id="tempsLimite" name="tempsLimite" formControlName="tempsLimite">

  <label for="realise">⭐ Réalise</label>
  <select id="realise" name="realise" formControlName="realise">
    <option [value]="false">Non Réalisé</option>
    <option [value]="true">Réalisé</option>
  </select>


  <mat-dialog-actions *ngIf="taskForm.valid">
    <button mat-button type="button" (click)="onClose()">Cancel</button>
    <button mat-button type="submit">{{ isEditMode ? 'Modifier' : 'Ajouter' }}</button>
  </mat-dialog-actions>
</form>


@if(_testView$S()){
  <pre>
    {{taskForm.value | json}}
  </pre>

}
