@if (this.address()) {

<div class="rounded-lg overflow-hidden">
  <div class="h-48 relative">
    <iframe width="100%" height="100%" frameborder="0" style="border:0" [src]="safeUrl()" allowfullscreen>
    </iframe>
    <div class="absolute top-2 right-2 bg-white rounded-full p-2">
      <i class="fas fa-map text-purple-600"></i>
    </div>
  </div>
</div>
}
