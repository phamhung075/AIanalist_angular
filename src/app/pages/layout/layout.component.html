<div class="min-h-screen bg-gray-100">
    <!-- Overlay pour mobile -->
    <div (click)="toggleSidenav()" [class.hidden]="!isSidenavOpen"
        class="fixed inset-0 bg-black bg-opacity-50 lg:hidden z-40">
    </div>

    <!-- Sidebar -->
    <aside [class.translate-x-0]="isSidenavOpen" [class.-translate-x-full]="!isSidenavOpen" class="fixed top-0 left-0 h-full w-64 bg-blue-800 text-white z-50
                  transform transition-transform duration-300 ease-in-out
                  lg:translate-x-0">
        <!-- Logo/Titre -->
        <div class="h-16 flex items-center justify-between px-6 bg-blue-900">
            <span class="text-xl font-bold">KYL Dashboard</span>
            <button (click)="toggleSidenav()" class="lg:hidden text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Navigation -->
        <nav class="mt-6 px-4">
            <div class="space-y-2">
                <a routerLink="/dashboard/kyls" routerLinkActive="bg-blue-900" (click)="toggleSidenav()"
                    class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2"
                            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    KYLs
                </a>

                <a routerLink="/dashboard/users" routerLinkActive="bg-blue-900" (click)="toggleSidenav()"
                    class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    Utilisateurs
                </a>

                <a routerLink="/dashboard/appels" routerLinkActive="bg-blue-900" (click)="toggleSidenav()"
                    class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2"
                            d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                    </svg>
                    Appels commerciaux
                </a>
                <a routerLink="/dashboard/formation" routerLinkActive="bg-blue-900" (click)="toggleSidenav()"
                class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                Formation
            </a>
                  <a routerLink="/dashboard/entreprises" routerLinkActive="bg-blue-900" (click)="toggleSidenav()"
                      class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">
                      <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2"
                              d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                      </svg>
                      Entreprises
                  </a>            </div>
        </nav>

        <!-- Profil utilisateur -->
        <div class="absolute bottom-0 w-full bg-blue-900 p-4">
            <div class="flex items-center">
                <div class="flex-shrink-0 cursor-pointer" routerLink="/dashboard/profil" (click)="toggleSidenav()">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <div class="ml-3">
                    <p class="text-sm font-medium text-white">{{ getUserName() }}</p>
                    <button (click)="logout()" class="text-xs text-blue-200 hover:text-white">
                        Se déconnecter
                    </button>
                </div>
            </div>
        </div>
    </aside>

    <!-- Contenu principal -->
    <div class="lg:pl-64 flex flex-col min-h-screen">
        <!-- Header -->
        <header class="h-16 bg-white shadow-sm fixed top-0 right-0 left-0 z-30 lg:left-64">
            <div class="h-full px-6 flex items-center justify-between">
                <div class="flex items-center">
                    <button (click)="toggleSidenav()" class="lg:hidden mr-4">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                    <h1 class="text-xl text-gray-800 font-medium">{{ getCurrentRoute() }}</h1>
                </div>
            </div>
        </header>

        <!-- Corps de la page -->
        <main class="flex-1 sm:p-6 mt-16 bg-gray-100">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
